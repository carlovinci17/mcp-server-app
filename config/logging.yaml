version: 1
disable_existing_loggers: false

formatters:
  structured:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: structured
    stream: ext://sys.stdout

root:
  level: INFO
  handlers: [console]

loggers:
  azure:
    level: WARNING
    propagate: true
  src:
    level: INFO
    propagate: true
